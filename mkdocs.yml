site_name: Plateforme de Gestion des PFA — Project #47
site_url: https://malek720.github.io/PFA_PROJECT/
theme:
  name: material
  palette:
    primary: indigo
    accent: teal
docs_dir: docs

nav:
  - Home: index.md
  - Cahier des Charges:
    - Contexte: Cahier_des_charges/Contexte.md
    - Acteurs: Cahier_des_charges/Acteurs.md
    - Besoins fonctionnels: Cahier_des_charges/Besoins_fonctionnels.md
    - Besoins non fonctionnels: Cahier_des_charges/Besoins_non_fonctionnels.md
  - UML Diagrams:
    - Cas d'utilisation: Diagrammes_UML/Cas_utilisation.md
    - Diagramme de classes: Diagrammes_UML/Diagramme_classes.md
    - Séquence — Individuel: Diagrammes_UML/Sequence_individuel.md
    - Séquence — Groupe: Diagrammes_UML/Sequence_groupe.md
    - Diagrammes d'activités: Diagrammes_UML/Diagrammes_Activites.md
  - Architecture:
    - Stack technique: Architecture/Stack_technique.md
  - Suivi de stage:
    - Journal hebdomadaire: Suivi_de_stage/Journal_hebdomadaire.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_javascript:
  - https://unpkg.com/mermaid@11/dist/mermaid.min.js
