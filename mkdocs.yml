site_name: My PFA Vault
site_url: https://malek720.github.io/PFA_PROJECT/
theme:
  name: material
  palette:
    primary: indigo
    accent: indigo
docs_dir: docs

nav:
  - Home: index.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - attr_list
  - md_in_html