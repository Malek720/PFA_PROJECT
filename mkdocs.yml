site_name: My PFA Vault
site_url: https://malek720.github.io/PFA_PROJECT/
Home: index.md
theme:
  name: material
  palette:
    primary: indigo
    accent: indigo
# This ensures MkDocs looks at the root of your vault for files
docs_dir: docs
# This allows for Obsidian-style callouts/admonitions
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences